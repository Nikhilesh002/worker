services:
  postgres:
    image: postgres:16-alpine
    container_name: worker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worker
      POSTGRES_PASSWORD: worker
      POSTGRES_DB: worker_dev
    ports:
      - "5432:5432"
    volumes:
      - worker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worker -d worker_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  worker_postgres_data:
